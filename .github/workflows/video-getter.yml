name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: '🔗 لینک ویدیو (چند لینک با فاصله)'
        required: true
        type: string
      quality:
        description: '🎬 کیفیت'
        required: false
        default: 'best'
        type: choice
        options:
          - best
          - 2160
          - 1440
          - 1080
          - 720
          - 480
          - audio
      download_subtitles:
        description: '📝 زیرنویس (فارسی و انگلیسی)'
        required: false
        default: false
        type: boolean
      password:
        description: '🔒 رمز فایل (اختیاری)'
        required: false
        default: ''
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Cache tools (yt-dlp, deno)
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.deno
            ~/.local/bin/yt-dlp
            /usr/local/bin/yt-dlp
          key: ${{ runner.os }}-ytdlp-v3-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-ytdlp-v3-

      - name: Install dependencies (if cache miss)
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip p7zip-full
          pip3 install --upgrade yt-dlp
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          sudo ln -sf $(which yt-dlp) /usr/local/bin/yt-dlp

      - name: Make tools available
        run: |
          export PATH="$HOME/.local/bin:$HOME/.deno/bin:/usr/local/bin:$PATH"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          echo "/usr/local/bin" >> $GITHUB_PATH
          if ! command -v yt-dlp &> /dev/null; then
            pip3 install --upgrade yt-dlp
          fi
          YT_PATH=$(which yt-dlp 2>/dev/null || true)
          if [ -n "$YT_PATH" ] && [ ! -f /usr/local/bin/yt-dlp ]; then
            sudo ln -sf "$YT_PATH" /usr/local/bin/yt-dlp
          fi
          yt-dlp --version
          deno --version

      - name: Setup YouTube cookies
        run: |
          if [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
            echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt
            echo "✅ Cookies loaded (from secret)"
          else
            echo "⚠️ No cookies found. YouTube may block the download."
          fi

      - name: Prepare folders
        run: |
          mkdir -p videos

      - name: Download videos
        env:
          URLS: ${{ github.event.inputs.video_urls }}
          QUALITY: ${{ github.event.inputs.quality }}
          WITH_SUBS: ${{ github.event.inputs.download_subtitles }}
          ZIP_PASS: ${{ github.event.inputs.password }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -e
          IFS=' ' read -ra URL_ARRAY <<< "$URLS"
          SPLIT_MB=45
          QUALITY="$QUALITY"
          SUBS="$WITH_SUBS"
          PASSWORD="$ZIP_PASS"
          COOKIE_FILE="cookies.txt"

          sanitize() {
            echo "$1" | sed 's/[^A-Za-z0-9_\-.波斯فارسی]/_/g' | sed 's/__*/_/g'
          }
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          # Determine format
          case "$QUALITY" in
            audio)      FORMAT="bestaudio/best" ;;
            best)       FORMAT="bestvideo+bestaudio/best" ;;
            2160)       FORMAT="bestvideo[height<=2160]+bestaudio/best" ;;
            1440)       FORMAT="bestvideo[height<=1440]+bestaudio/best" ;;
            1080)       FORMAT="bestvideo[height<=1080]+bestaudio/best" ;;
            720)        FORMAT="bestvideo[height<=720]+bestaudio/best" ;;
            480)        FORMAT="bestvideo[height<=480]+bestaudio/best" ;;
            *)          FORMAT="bestvideo+bestaudio/best" ;;
          esac

          # Common yt-dlp options
          COMMON_OPTS="--merge-output-format mp4 --write-thumbnail --convert-thumbnails jpg --no-playlist --retries 5 --fragment-retries 5 --no-check-certificates"
          if [ -f "$COOKIE_FILE" ]; then
            COMMON_OPTS="$COMMON_OPTS --cookies $COOKIE_FILE"
          fi

          idx=1
          for URL in "${URL_ARRAY[@]}"; do
            echo "============================================"
            echo "Downloading ($idx/${#URL_ARRAY[@]}): $URL"
            echo "============================================"

            TMP_DIR="tmp_$idx"
            mkdir -p "$TMP_DIR"

            DOWNLOAD_OK=false
            # Try different methods
            for METHOD in 1 2 3 4; do
              echo "Trying method $METHOD..."
              case $METHOD in
                1)
                  yt-dlp $COMMON_OPTS --format "$FORMAT" \
                    --output "$TMP_DIR/%(title)s.%(ext)s" \
                    --js-runtimes deno --remote-components ejs:github \
                    "$URL" && DOWNLOAD_OK=true
                  ;;
                2)
                  yt-dlp $COMMON_OPTS --format "$FORMAT" \
                    --output "$TMP_DIR/%(title)s.%(ext)s" \
                    --extractor-args "youtube:player_client=web" \
                    "$URL" && DOWNLOAD_OK=true
                  ;;
                3)
                  yt-dlp $COMMON_OPTS --format "$FORMAT" \
                    --output "$TMP_DIR/%(title)s.%(ext)s" \
                    --extractor-args "youtube:player_client=mweb" \
                    "$URL" && DOWNLOAD_OK=true
                  ;;
                4)
                  yt-dlp $COMMON_OPTS --format "best[height<=720]+bestaudio/best" \
                    --output "$TMP_DIR/%(title)s.%(ext)s" \
                    "$URL" && DOWNLOAD_OK=true
                  ;;
              esac
              if [ "$DOWNLOAD_OK" = true ]; then break; fi
              sleep 2
            done

            if [ "$DOWNLOAD_OK" = false ]; then
              echo "❌ Failed to download: $URL"
              rm -rf "$TMP_DIR"
              idx=$((idx+1))
              continue
            fi

            VIDEO_FILE=$(find "$TMP_DIR" -type f \( -name "*.mp4" -o -name "*.mkv" -o -name "*.webm" \) | head -1)
            THUMB_FILE=$(find "$TMP_DIR" -type f -name "*.jpg" | head -1)
            if [ -z "$VIDEO_FILE" ]; then
              echo "❌ No video file found!"
              rm -rf "$TMP_DIR"
              idx=$((idx+1))
              continue
            fi

            BASENAME=$(basename "$VIDEO_FILE")
            NAME_NOEXT="${BASENAME%.*}"
            SAFE_NAME=$(sanitize "$NAME_NOEXT")
            FOLDER_NAME="$SAFE_NAME"

            FINAL_DIR="videos/$FOLDER_NAME"
            mkdir -p "$FINAL_DIR"

            # Copy thumbnail
            if [ -f "$THUMB_FILE" ]; then
              cp "$THUMB_FILE" "$FINAL_DIR/thumbnail.jpg"
            fi

            FILE_SIZE=$(stat -c%s "$VIDEO_FILE")
            MAX_SIZE=$((100 * 1024 * 1024))   # 100MB
            if [ "$FILE_SIZE" -gt "$MAX_SIZE" ]; then
              echo "File >100MB, splitting into ${SPLIT_MB}MB parts..."
              if [ -n "$PASSWORD" ]; then
                7z a -tzip -v${SPLIT_MB}m -p"$PASSWORD" "$FINAL_DIR/${FOLDER_NAME}.zip" "$VIDEO_FILE"
              else
                zip -0 -s ${SPLIT_MB}m "$FINAL_DIR/${FOLDER_NAME}.zip" "$VIDEO_FILE"
              fi
              PART_LINKS=""
              for part in $(ls "$FINAL_DIR"/${FOLDER_NAME}.z* "$FINAL_DIR"/${FOLDER_NAME}.zip 2>/dev/null | sort -V); do
                PART_NAME=$(basename "$part")
                ENC_PART=$(urlencode "$PART_NAME")
                LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${FOLDER_NAME}/${ENC_PART}"
                PART_LINKS="${PART_LINKS}| ${PART_NAME} | [Download](${LINK}) |\n"
              done
              TOTAL_PARTS=$(echo -e "$PART_LINKS" | wc -l)
              cat > "$FINAL_DIR/README.md" <<EOF
# ${NAME_NOEXT}

![Thumbnail](thumbnail.jpg)

## Video Info
- **Quality**: ${QUALITY}
- **Original URL**: [YouTube](${URL})
- **Total Size**: $(numfmt --to=iec $FILE_SIZE)
- **Parts**: ${TOTAL_PARTS}
$( [ -n "$PASSWORD" ] && echo "- **Password**: YES (use when extracting)" )

## Download Links
Download all parts into the same folder, then extract the first part.

| File | Link |
|------|------|
$(echo -e "$PART_LINKS")
EOF
            else
              cp "$VIDEO_FILE" "$FINAL_DIR/${FOLDER_NAME}.mp4"
              ENC_FILE=$(urlencode "${FOLDER_NAME}.mp4")
              RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${FOLDER_NAME}/${ENC_FILE}"
              cat > "$FINAL_DIR/README.md" <<EOF
# ${NAME_NOEXT}

![Thumbnail](thumbnail.jpg)

## Video Info
- **Quality**: ${QUALITY}
- **Original URL**: [YouTube](${URL})
- **Size**: $(numfmt --to=iec $FILE_SIZE)
$( [ -n "$PASSWORD" ] && echo "- **Password**: YES (zip is password protected)" )

## Download Link
[Download ${FOLDER_NAME}.mp4](${RAW_LINK})
EOF
            fi

            # Subtitles if requested
            if [ "$SUBS" = "true" ]; then
              echo "Downloading subtitles..."
              SUB_DIR="$FINAL_DIR/subtitles"
              mkdir -p "$SUB_DIR"
              yt-dlp $COMMON_OPTS --write-sub --sub-langs fa,en --convert-subs vtt --skip-download \
                --output "$SUB_DIR/%(title)s.%(ext)s" "$URL" 2>/dev/null || true
              yt-dlp $COMMON_OPTS --write-auto-sub --sub-langs fa,en --convert-subs vtt --skip-download \
                --output "$SUB_DIR/%(title)s.%(ext)s" "$URL" 2>/dev/null || true
              if [ -n "$(find "$SUB_DIR" -type f -size +0c 2>/dev/null)" ]; then
                (cd "$SUB_DIR" && zip -j "../subtitles.zip" ./*) && rm -rf "$SUB_DIR"
              else
                rmdir "$SUB_DIR" 2>/dev/null || true
              fi
            fi

            echo "✅ Done: $FOLDER_NAME"
            rm -rf "$TMP_DIR"
            idx=$((idx+1))
          done

      - name: Push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f videos/
          git diff --cached --quiet || git commit -m "Add downloaded videos [skip ci]"
          for i in {1..5}; do
            if git push origin HEAD:${GITHUB_REF_NAME}; then
              echo "✅ Push successful"
              break
            else
              echo "Push failed, retry $i/5..."
              sleep 5
              git pull --rebase origin ${GITHUB_REF_NAME} || true
            fi
          done
